<svg width="160" height="40" viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cgcone">
  <!-- Pill background -->
  <rect width="160" height="40" rx="10" fill="#0f0f0f"/>

  <!-- Icon mark (32x32 positioned at 4,4) -->
  <g transform="translate(4, 4)">
    <!-- Apex glow -->
    <circle cx="16" cy="24.5" r="7.5" fill="#c96a50" fill-opacity="0.13"/>

    <!-- Source-layer connector -->
    <line x1="7.5" y1="9" x2="24.5" y2="9" stroke="#c96a50" stroke-width="1" stroke-opacity="0.28"/>

    <!-- Converging lines -->
    <line x1="7.5"  y1="9" x2="16" y2="24.5" stroke="#c96a50" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.55"/>
    <line x1="16"   y1="9" x2="16" y2="24.5" stroke="#c96a50" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.80"/>
    <line x1="24.5" y1="9" x2="16" y2="24.5" stroke="#c96a50" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.55"/>

    <!-- Source nodes -->
    <circle cx="7.5"  cy="9" r="2.5" fill="#c96a50" fill-opacity="0.72"/>
    <circle cx="16"   cy="9" r="2.5" fill="#c96a50"/>
    <circle cx="24.5" cy="9" r="2.5" fill="#c96a50" fill-opacity="0.72"/>

    <!-- Apex node -->
    <circle cx="16" cy="24.5" r="3.5" fill="#c96a50"/>
  </g>

  <!-- Vertical divider -->
  <line x1="44" y1="10" x2="44" y2="30" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Wordmark -->
  <text
    x="54" y="26"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace"
    font-size="17" font-weight="500" letter-spacing="-0.2"
    fill="#f0f0f0"
  >cgcone</text>
</svg>
