name: Nightly Registry Sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Always use built-in GITHUB_TOKEN for checkout — controls git push auth.
          # Using a PAT here causes 403 if the token expires (the "denied to Himanshu507" bug).
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate registry.json
        env:
          # GH_SYNC_TOKEN (fine-grained PAT) = 5000 req/hr. Falls back to GITHUB_TOKEN (1000/hr).
          GITHUB_TOKEN: ${{ secrets.GH_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
        run: node scripts/generate-registry.js

      - name: Sync registry (dedup, renames, removed repos, star refresh)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
        run: node scripts/sync-registry.js

      - name: Commit updated registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/registry.json
          if git diff --staged --quiet; then
            echo "No registry changes to commit"
            exit 0
          fi
          git commit -m "chore: update registry [skip ci]"
          git push
