name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "e.g. I can't install Python-based MCP servers easily because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "What would you like cgcone to do?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI (cgcone commands)
        - Website (cgcone.com)
        - Registry / data
        - New CLI adapter
        - Other
