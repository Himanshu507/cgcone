name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill out as much as you can.

  - type: input
    id: version
    attributes:
      label: cgcone version
      placeholder: "e.g. 0.1.2 (run: cgcone --version)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: dropdown
    id: cli
    attributes:
      label: Affected CLI
      multiple: true
      options:
        - Claude Code
        - Gemini CLI
        - OpenAI Codex
        - GitHub Copilot CLI
        - All / not CLI-specific

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: "Describe the bug"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `cgcone install ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Terminal output / error message
      render: shell
